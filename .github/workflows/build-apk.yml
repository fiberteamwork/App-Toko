name: Build Flutter APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🎯 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true

    - name: 📦 Get dependencies
      run: |
        cd app_toko_extracted
        flutter pub get

    - name: 🔍 Analyze code
      run: |
        cd app_toko_extracted
        flutter analyze

    - name: 🧪 Run tests
      run: |
        cd app_toko_extracted
        flutter test 2>/dev/null || true

    - name: 🔨 Build APK (Release)
      run: |
        cd app_toko_extracted
        flutter build apk \
          --release \
          --target-platform android-arm,android-arm64,android-x86,android-x86_64 \
          --split-per-abi

    - name: 📝 Get APK info
      run: |
        cd app_toko_extracted
        ls -lh build/app/outputs/flutter-apk/
        echo ""
        echo "✅ Build Complete!"

    - name: 📤 Upload APK Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: flutter-apks
        path: |
          app_toko_extracted/build/app/outputs/flutter-apk/app-*.apk
        retention-days: 30

    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release-apk
        path: app_toko_extracted/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

    - name: 📊 Report Status
      if: always()
      run: |
        echo "================================"
        echo "✅ BUILD COMPLETED"
        echo "================================"
        echo ""
        echo "📥 Check Artifacts tab above to download APK"
        echo "⏱️ Build Time: ${{ job.duration }}"
        echo ""
